<div class="flex justify-center mt-20">

  <div class=" bg-white rounded-md shadow-md w-full max-w-96">

    <form [formGroup]="form" (ngSubmit)="onSubmit()"  class="m-4">
      <div class="text-2xl text-center mt-2">
        Llamar a Paciente
      </div>
      <div class="m-4">
        <label class="block" for="name">Nombre</label>
        <input
          class="p-2 w-full text-gray-900 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-400 focus:border-blue-500"
          type="text" id="name" formControlName="patient"
          [class.border-red-500]="(form.controls['patient'].touched || form.controls['patient'].dirty) && form.controls['patient'].invalid">
        <div class="text-red-500 text-sm"
          *ngIf="(form.controls['patient'].touched || form.controls['patient'].dirty)">
          <div *ngIf="form.controls['patient'].hasError('required')">
            Obligatorio.
          </div>
          <div *ngIf="form.controls['patient'].hasError('maxlength')">
            El nombre no puede superar los 20 caracteres.
          </div>
        </div>

      </div>

      <div class="text-center m-4">
        <button
          class="bg-blue-500 rounded-md text-white p-2 transition-all hover:brightness-110 disabled:opacity-50"
          type="submit" [disabled]="form.invalid || loading">        
          Llamar
        </button>
      </div>
    </form>
  </div>
</div>
